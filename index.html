<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ID Extractor Pro - Custom Dashboard</title>
    <style>
        :root {
            --bg: #050508;
            --card: rgba(20, 20, 30, 0.6);
            --primary: #b721ff;
            --secondary: #21d4fd;
            --accent: #00f2ff;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at top right, rgba(183, 33, 255, 0.15), transparent),
                radial-gradient(circle at bottom left, rgba(33, 212, 253, 0.15), transparent);
        }

        /* Clean Header */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .brand { font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; background: linear-gradient(to right, #b721ff, #21d4fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Main Grid Layout */
        main {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 992px) {
            main { grid-template-columns: 1fr; }
        }

        /* Professional Panels */
        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-head {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 15px;
            padding: 0 20px 20px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 10px 15px;
            border-radius: 12px;
            flex: 1;
        }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: 700; color: var(--secondary); }

        /* File Drop Area */
        #drop-zone {
            margin: 20px;
            padding: 30px;
            border: 2px dashed var(--border);
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        #drop-zone:hover { border-color: var(--primary); background: rgba(183, 33, 255, 0.05); }

        /* Interactive ID List */
        .id-list {
            height: 450px;
            overflow-y: auto;
        }

        .id-row {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .id-row:hover { background: rgba(255,255,255,0.03); }
        .id-row:active { background: var(--primary); transform: scale(0.98); }
        .id-row span:first-child { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 500; }
        .id-row::after { content: '→'; opacity: 0; transition: 0.3s; color: white; }
        .id-row:hover::after { opacity: 0.5; transform: translateX(-5px); }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .btn {
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), #8e2de2); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Detail Area */
        .detail-view {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            margin: 0 20px 20px;
            font-size: 0.85rem;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }

        .json-key { color: #ff79c6; }
        .json-val { color: #50fa7b; }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            header { padding: 15px; }
            .brand { font-size: 1rem; }
            .action-grid { grid-template-columns: 1fr; }
            .id-list { height: 350px; }
        }

        /* Toast & Animations */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 12px 24px; border-radius: 50px;
            font-weight: 600; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="brand">RASS</div>
    <div id="loading-spinner" style="display:none; width: 20px; height: 20px; border: 2px solid #fff; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
</header>

<main>
    <div class="glass-panel">
        <div class="panel-head">
            <h3>Workspace</h3>
            <button class="btn btn-secondary" style="padding: 5px 12px; font-size: 0.7rem;" onclick="clearAll()">RESET</button>
        </div>
        
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>📁 Drop JSON files here</p>
            <span style="font-size: 0.7rem; color: var(--text-dim);">or click to browse</span>
            <input type="file" id="file-input" multiple accept=".json" style="display:none">
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Files</div>
                <div id="stat-files" class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Unique IDs</div>
                <div id="stat-ids" class="stat-val">0</div>
            </div>
        </div>

        <div id="file-list" style="padding: 0 20px 20px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div class="glass-panel">
        <div class="panel-head">
            <div style="display:flex; align-items:center; gap:10px;">
                <h3>Results</h3>
                <label style="font-size: 0.7rem; color: var(--text-dim); display:flex; align-items:center; gap:4px;">
                    <input type="checkbox" id="unique-toggle" checked onchange="processFiles()"> Remove Duplicate
                </label>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="btn btn-secondary" style="padding: 5px 12px; font-size: 0.7rem;" onclick="sortPretty()">✨ PRETTY SORT</button>
                <button class="btn btn-secondary" style="padding: 5px 12px; font-size: 0.7rem;" onclick="restoreOriginal()">↩️ ORIGINAL</button>
            </div>
        </div>

        <div id="id-list-view" class="id-list">
            <div style="text-align:center; padding: 100px 20px; color:var(--text-dim);">Upload JSON to start extraction</div>
        </div>

        <div class="action-grid">
            <button class="btn btn-primary" onclick="copyAll()">📋 COPY ALL</button>
            <button class="btn btn-secondary" onclick="downloadTxt()">💾 DOWNLOAD .TXT</button>
        </div>

        <div class="panel-head" style="border-top: 1px solid var(--border);">
            <h3>Detail Inspector</h3>
            <button class="btn btn-secondary" style="padding: 5px 12px; font-size: 0.7rem;" onclick="copyDetail()">COPY JSON</button>
        </div>
        <div id="detail-view" class="detail-view">
            <span style="color:var(--text-dim)">Click an ID from the list above to see details.</span>
        </div>
    </div>
</main>

<div id="toast">Copied!</div>

<script>
    let state = {
        files: [],
        extractedIds: [],
        originalIds: [],
        currentId: null
    };

    const targetKeys = ["account_id", "game_uid"];

    // File Handling
    document.getElementById('file-input').addEventListener('change', e => handleFiles(e.target.files));
    
    async function handleFiles(fileList) {
        document.getElementById('loading-spinner').style.display = 'block';
        for (let file of fileList) {
            if (!file.name.endsWith('.json')) continue;
            try {
                const text = await file.text();
                const json = JSON.parse(text);
                state.files.push({
                    name: file.name,
                    size: file.size,
                    data: json,
                    id: Math.random().toString(36).substr(2, 9)
                });
            } catch (err) { alert("Error parsing " + file.name); }
        }
        processFiles();
        renderFileList();
        document.getElementById('loading-spinner').style.display = 'none';
    }

    function processFiles() {
        let allIds = [];
        state.files.forEach(f => {
            allIds = allIds.concat(extractRecursive(f.data));
        });

        const isUnique = document.getElementById('unique-toggle').checked;
        state.extractedIds = isUnique ? [...new Set(allIds)] : allIds;
        state.originalIds = [...state.extractedIds];
        
        renderIdList();
        document.getElementById('stat-files').innerText = state.files.length;
        document.getElementById('stat-ids').innerText = state.extractedIds.length;
    }

    function extractRecursive(obj) {
        let found = [];
        if (typeof obj !== 'object' || obj === null) return found;
        if (Array.isArray(obj)) {
            obj.forEach(item => found = found.concat(extractRecursive(item)));
        } else {
            for (let key in obj) {
                if (targetKeys.includes(key) && obj[key]) found.push(String(obj[key]));
                if (typeof obj[key] === 'object') found = found.concat(extractRecursive(obj[key]));
            }
        }
        return found;
    }

    function renderIdList() {
        const view = document.getElementById('id-list-view');
        if (state.extractedIds.length === 0) {
            view.innerHTML = `<div style="text-align:center; padding: 100px 20px; color:var(--text-dim);">No IDs found.</div>`;
            return;
        }
        view.innerHTML = state.extractedIds.map(id => `
            <div class="id-row" onclick="inspectId('${id}')">
                <span>${id}</span>
            </div>
        `).join('');
    }

    function renderFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = state.files.map(f => `
            <div style="display:flex; justify-content:space-between; font-size:0.75rem; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:5px;">
                <span>📄 ${f.name}</span>
                <span style="color:var(--text-dim)">${(f.size/1024).toFixed(1)} KB</span>
            </div>
        `).join('');
    }

    function inspectId(id) {
        let results = [];
        state.files.forEach(f => {
            const matches = findInJson(f.data, id);
            matches.forEach(m => results.push({ fileName: f.name, path: m.path, data: m.data }));
        });

        const view = document.getElementById('detail-view');
        if (results.length === 0) {
            view.innerHTML = "Not found.";
            return;
        }

        view.innerHTML = results.map(r => `
            <div style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                <div style="color: var(--secondary); font-weight: bold; font-size: 0.7rem;">FILE: ${r.fileName}</div>
                <div style="color: var(--text-dim); font-size: 0.6rem; margin-bottom: 5px;">PATH: ${r.path}</div>
                <pre style="background:#000; padding:10px; border-radius:8px; overflow-x:auto;">${formatPrettyJson(r.data, id)}</pre>
            </div>
        `).join('');
        
        view.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function findInJson(obj, target, path = '') {
        let found = [];
        if (typeof obj !== 'object' || obj === null) return found;
        if (Array.isArray(obj)) {
            obj.forEach((item, i) => found = found.concat(findInJson(item, target, `${path}[${i}]`)));
        } else {
            for (let key in obj) {
                let p = path ? `${path}.${key}` : key;
                if (targetKeys.includes(key) && String(obj[key]) === String(target)) {
                    found.push({ path: p, data: obj });
                }
                if (typeof obj[key] === 'object') found = found.concat(findInJson(obj[key], target, p));
            }
        }
        return found;
    }

    function formatPrettyJson(obj, highlight) {
        return JSON.stringify(obj, null, 2)
            .replace(/"(\w+)":/g, '<span class="json-key">"$1"</span>:')
            .replace(/: "(.*)"/g, (m, p1) => {
                const color = p1 === highlight ? 'background:rgba(255,255,255,0.2)' : '';
                return `: <span class="json-val" style="${color}">"${p1}"</span>`;
            });
    }

    // Pretty Sort Logic
    function getScore(id) {
        const s = String(id);
        if (/(\d)\1{3,}/.test(s)) return 100; // 1111
        if (/1234|2345|3456|4567|5678|6789/.test(s)) return 80;
        if (s === s.split('').reverse().join('')) return 60; // Palindrome
        if (/69|420|1337/.test(s)) return 40;
        return 0;
    }

    function sortPretty() {
        state.extractedIds.sort((a, b) => getScore(b) - getScore(a) || a.localeCompare(b));
        renderIdList();
        notify("✨ Sorted by Beauty Patterns");
    }

    function restoreOriginal() {
        state.extractedIds = [...state.originalIds];
        renderIdList();
        notify("↩️ Restored to original order");
    }

    function copyAll() {
        navigator.clipboard.writeText(state.extractedIds.join('\n'));
        notify("📋 Copied All IDs");
    }

    function downloadTxt() {
        const blob = new Blob([state.extractedIds.join('\n')], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `ids_${Date.now()}.txt`;
        a.click();
    }

    function notify(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function clearAll() {
        if(confirm("Clear current session?")) {
            state = { files: [], extractedIds: [], originalIds: [], currentId: null };
            processFiles();
            renderFileList();
            document.getElementById('detail-view').innerHTML = '<span style="color:var(--text-dim)">Click an ID from the list...</span>';
            notify("🗑️ Workspace Cleared");
        }
    }

    function copyDetail() {
        const txt = document.getElementById('detail-view').innerText;
        navigator.clipboard.writeText(txt);
        notify("📋 Detail Copied");
    }
</script>

</body>
</html>
